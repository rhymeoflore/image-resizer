services:
  - type: web
    name: file-tools
    runtime: python
    nativePackages:
      - ghostscript
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn resize_images_ui:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
